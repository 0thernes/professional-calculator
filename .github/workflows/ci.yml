name: Professional Calculator CI

# Scoped to the calculator subproject so the rest of the monorepo is untouched.
on:
  push:
    branches: [master, scientific-engine]
    paths: ['**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['**', '.github/workflows/ci.yml']
  workflow_dispatch:

defaults:
  run:
    working-directory: '.'

jobs:
  lint:
    name: lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - run: npm ci --no-audit --no-fund
      - name: Lint (ESLint, 0 errors)
        run: npm run lint

  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dev dependencies
        run: npm ci --no-audit --no-fund
      - name: Type-check (tsc --noEmit, strict)
        run: npm run typecheck
      - name: Run test suite
        run: npm test

  coverage:
    name: coverage gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - run: npm ci --no-audit --no-fund
      - name: Coverage (enforces 90% lines/stmts, 85% funcs, 80% branches)
        run: npm run test:coverage

  benchmark:
    name: benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - run: npm ci --no-audit --no-fund
      - name: Run benchmarks (must not throw)
        run: npm run bench
